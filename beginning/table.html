<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLES</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <table>
        <caption>STUDENTS DETAILS </caption>
        <tr>
            <! -- table row AND CAPTION IS A TYPE OF HEADING OF charset -->
                <th>NAME </th>
                <th>CITY </th>
                <th>COUNTRY </th>
        </tr>
        <tr>
            <td>BARIRA</td>
            <! -- table data -->
                <td rowspan="2">KHIPRO</td>
                <td>PAKISTAN</td>


        </tr>
        <tr>
            <td colspan="2"> RIRA</td>
            <! -- table data --> <!-- colspan use wit td how much col space will iit use and rowspan also use-->

                <td>PALESTINE</td>


        </tr> <!-- rows will keep adding on below the table-->
    </table>
</body>

</html>
